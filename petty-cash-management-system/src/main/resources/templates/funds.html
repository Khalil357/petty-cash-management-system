<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Funds - Petty Cash Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="ml-64 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8 shadow-sm">
        <h1 class="text-2xl font-semibold text-slate-800">Fund Management</h1>
        <div class="flex items-center space-x-4">
            <span class="text-sm font-medium bg-indigo-100 text-indigo-700 py-1 px-3 rounded-full">Admin</span>
            <div class="w-10 h-10 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold shadow text-sm">
                <span sec:authentication="name">U</span>
            </div>
        </div>
    </header>

    <main class="flex-1 p-8">

        <!-- Flash Messages -->
        <div th:if="${success}" class="mb-6 bg-emerald-50 border border-emerald-200 text-emerald-700 px-5 py-3 rounded-xl text-sm flex items-center gap-2">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span th:text="${success}">Success</span>
        </div>

        <div th:if="${error}" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-5 py-3 rounded-xl text-sm flex items-center gap-2">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span th:text="${error}">Error</span>
        </div>

        <!-- Balance Card -->
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-2xl shadow-sm p-8 mb-8 text-white">
            <div class="flex items-start justify-between">
                <div>
                    <p class="text-slate-300 text-sm font-medium">Current Petty Cash Balance</p>
                    <p class="text-5xl font-bold mt-2" th:text="'$' + ${#numbers.formatDecimal(fund != null ? fund.currentBalance : 0, 1, 2)}">$10,000.00</p>
                    <p class="text-slate-400 text-sm mt-2">
                        Last updated:
                        <span th:text="${fund != null ? #temporals.format(fund.lastUpdated, 'MMM dd, yyyy HH:mm') : 'N/A'}">Jan 01</span>
                    </p>
                </div>
                <div class="bg-white/10 p-3 rounded-xl">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
        </div>

        <!-- Replenish Fund Form -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 mb-8">
            <h2 class="text-lg font-semibold text-slate-800 mb-4">Replenish Fund</h2>
            <form th:action="@{/admin/funds/replenish}" method="post" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Amount ($)</label>
                    <input type="number" name="amount" step="0.01" min="0.01" required
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                           placeholder="0.00">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                    <input type="text" name="description" required
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                           placeholder="e.g., Monthly fund top-up">
                </div>
                <div class="md:col-span-3">
                    <button type="submit"
                            class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2.5 rounded-lg font-medium transition shadow-sm text-sm">
                        Add Funds
                    </button>
                </div>
            </form>
        </div>

        <!-- Transaction History -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-lg font-semibold text-slate-800">Transaction History</h3>
                <span class="text-sm text-slate-400" th:text="${#lists.size(transactions)} + ' record(s)'">0 records</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white text-slate-400 text-xs uppercase tracking-wider">
                            <th class="px-6 py-4 font-medium">Date</th>
                            <th class="px-6 py-4 font-medium">Type</th>
                            <th class="px-6 py-4 font-medium">Description</th>
                            <th class="px-6 py-4 font-medium text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="t : ${transactions}" class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 text-sm text-slate-500" th:text="${#temporals.format(t.transactionDate, 'MMM dd, yyyy HH:mm')}">Jan 01</td>
                            <td class="px-6 py-4">
                                <span th:if="${t.transactionType.name() == 'REPLENISHMENT'}"
                                      class="inline-block bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-semibold">Replenishment</span>
                                <span th:if="${t.transactionType.name() == 'DISBURSEMENT'}"
                                      class="inline-block bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-semibold">Disbursement</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-500" th:text="${t.description}">Description</td>
                            <td class="px-6 py-4 text-sm font-bold text-right"
                                th:classappend="${t.transactionType.name() == 'REPLENISHMENT'} ? 'text-emerald-600' : 'text-red-600'"
                                th:text="${t.transactionType.name() == 'REPLENISHMENT'} ? '+$' + ${#numbers.formatDecimal(t.amount, 1, 2)} : '-$' + ${#numbers.formatDecimal(t.amount, 1, 2)}">
                                $0.00
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(transactions)}">
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                <p class="text-sm font-medium">No transactions yet</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

</body>
</html>
