<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Disbursements</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="ml-64 p-8">

    <h1 class="text-3xl font-bold mb-6">
        Disbursements
    </h1>

    <div class="bg-white rounded-xl shadow p-6">

        <table class="w-full">

            <thead>
            <tr class="bg-gray-900 text-white">
                <th class="p-3">Request</th>
                <th class="p-3">Amount</th>
                <th class="p-3">Action</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="disbursement : ${disbursements}"
                class="border-b hover:bg-gray-50">

                <td class="p-3"
                    th:text="${disbursement.id}">
                </td>

                <td class="p-3"
                    th:text="${disbursement.request.id}">
                </td>

                <td class="p-3"
                    th:text="${disbursement.amount}">
                </td>

                <td class="p-3"
                    th:text="${disbursement.referenceNumber}">
                </td>

                <td class="p-3"
                    th:text="${disbursement.disbursementDate}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>

</html>
