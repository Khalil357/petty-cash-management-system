<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="ml-64">

    <div class="bg-white shadow p-5">
        <h1 class="text-3xl font-bold">
            Dashboard
        </h1>
    </div>

    <div class="p-8 grid grid-cols-4 gap-6">

        <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500">Users</h3>
            <p class="text-4xl font-bold">15</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500">Requests</h3>
            <p class="text-4xl font-bold">25</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500">Pending</h3>
            <p class="text-4xl font-bold">4</p>
        </div>

        <div class="bg-white p-6 rounded-xl shadow">
            <h3 class="text-gray-500">Balance</h3>
            <p class="text-4xl font-bold">5M</p>
        </div>

    </div>

</div>

</body>
</html>
