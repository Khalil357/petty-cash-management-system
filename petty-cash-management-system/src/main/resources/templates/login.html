<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Petty Cash Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Logo Area -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-900 text-white rounded-2xl mb-4 shadow-lg">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Petty Cash Management</h1>
            <p class="text-slate-500 mt-1">Sign in to your account</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 p-8">
            <!-- Error Message -->
            <div th:if="${error}" class="mb-4 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span th:text="${error}">Invalid credentials</span>
            </div>

            <!-- Logout Message -->
            <div th:if="${logout}" class="mb-4 bg-blue-50 border border-blue-200 text-blue-700 px-4 py-3 rounded-lg text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <span th:text="${logout}">You have been logged out</span>
            </div>

            <form action="/login" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input type="email" name="username" required
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                           placeholder="admin@pettycash.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required
                           class="w-full px-4 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition text-sm"
                           placeholder="password123">
                </div>
                <button type="submit"
                        class="w-full bg-slate-900 hover:bg-slate-800 text-white py-2.5 rounded-lg font-medium transition shadow-sm text-sm">
                    Sign In
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="mt-6 pt-6 border-t border-slate-100">
                <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider mb-3">Demo Accounts</p>
                <div class="space-y-2 text-xs">
                    <div class="flex justify-between items-center py-1.5 px-3 bg-slate-50 rounded-lg">
                        <span class="font-medium text-slate-600">Admin</span>
                        <span class="font-mono text-slate-500">admin@pettycash.com</span>
                    </div>
                    <div class="flex justify-between items-center py-1.5 px-3 bg-slate-50 rounded-lg">
                        <span class="font-medium text-slate-600">Manager</span>
                        <span class="font-mono text-slate-500">manager@pettycash.com</span>
                    </div>
                    <div class="flex justify-between items-center py-1.5 px-3 bg-slate-50 rounded-lg">
                        <span class="font-medium text-slate-600">Employee</span>
                        <span class="font-mono text-slate-500">eve@pettycash.com</span>
                    </div>
                    <div class="pt-2 text-center text-slate-400 text-xs">
                        Password for all accounts: <span class="font-mono font-medium">password123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
