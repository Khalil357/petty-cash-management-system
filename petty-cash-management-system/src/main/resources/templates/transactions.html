<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Transactions - Petty Cash Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">

<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<div class="ml-64 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 h-16 flex items-center justify-between px-8 shadow-sm">
        <h1 class="text-2xl font-semibold text-slate-800">Transaction History</h1>
        <div class="flex items-center space-x-4">
            <div class="w-10 h-10 rounded-full bg-slate-800 text-white flex items-center justify-center font-bold shadow text-sm">U</div>
        </div>
    </header>

    <main class="flex-1 p-8">

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-5 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-lg font-semibold text-slate-800">All Fund Transactions</h3>
                <span class="text-sm text-slate-400" th:text="${#lists.size(transactions)} + ' record(s)'">0 records</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-white text-slate-400 text-xs uppercase tracking-wider">
                            <th class="px-6 py-4 font-medium">Date</th>
                            <th class="px-6 py-4 font-medium">Type</th>
                            <th class="px-6 py-4 font-medium">Description</th>
                            <th class="px-6 py-4 font-medium text-right">Amount</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
                        <tr th:each="t : ${transactions}" class="hover:bg-slate-50 transition">
                            <td class="px-6 py-4 text-sm text-slate-500" th:text="${#temporals.format(t.transactionDate, 'MMM dd, yyyy HH:mm')}">Jan 01</td>
                            <td class="px-6 py-4">
                                <span th:if="${t.transactionType.name() == 'REPLENISHMENT'}"
                                      class="inline-block bg-emerald-100 text-emerald-700 px-3 py-1 rounded-full text-xs font-semibold">Replenishment</span>
                                <span th:if="${t.transactionType.name() == 'DISBURSEMENT'}"
                                      class="inline-block bg-red-100 text-red-700 px-3 py-1 rounded-full text-xs font-semibold">Disbursement</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-500" th:text="${t.description}">Description</td>
                            <td class="px-6 py-4 text-sm font-bold text-right"
                                th:classappend="${t.transactionType.name() == 'REPLENISHMENT'} ? 'text-emerald-600' : 'text-red-600'"
                                th:text="${t.transactionType.name() == 'REPLENISHMENT'} ? '+$' + ${#numbers.formatDecimal(t.amount, 1, 2)} : '-$' + ${#numbers.formatDecimal(t.amount, 1, 2)}">
                                $0.00
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(transactions)}">
                            <td colspan="4" class="px-6 py-12 text-center text-slate-400">
                                <div class="flex flex-col items-center gap-2">
                                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                                    <p class="text-sm font-medium">No transactions recorded</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>
</div>

</body>
</html>
